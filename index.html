<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a1830" />
  <title>SKYBREAKER — Aerial Combat</title>
  <link rel="stylesheet" href="src/styles.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas id="scene"></canvas>

  <!-- Loading screen -->
  <div id="loader">
    <div class="loader-inner">
      <h1 class="logo">SKYBREAKER</h1>
      <p class="tagline">Aerial Combat</p>
      <div class="bar"><div id="bar-fill"></div></div>
      <p id="loader-status">Spooling engines…</p>
    </div>
  </div>

  <!-- Start / menu screen -->
  <div id="menu" class="hidden">
    <div class="menu-inner">
      <h1 class="logo">SKYBREAKER</h1>
      <button id="start-btn" class="btn-primary">ENGAGE</button>
      <button id="watch-btn" class="btn-secondary">WATCH AI ✈</button>
      <div class="controls-hint">
        <p><strong>Left stick</strong> — Steer &nbsp;·&nbsp; <strong>Right buttons</strong> — Throttle / Fire / Camera</p>
        <p class="muted">Gamepad &amp; keyboard (WASD / Space / C) also supported</p>
      </div>
    </div>
    <div id="patch-version" class="patch-version"></div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-top">
      <div class="hud-stat"><span id="hud-score">0</span></div>
      <div class="hud-stat match-timer"><span id="match-timer">3:00</span></div>
    </div>

    <!-- Crosshair / target reticle -->
    <div id="reticle">
      <div class="reticle-ring"></div>
      <div class="reticle-dot"></div>
    </div>
    <div id="lead-marker" class="hidden"></div>

    <!-- Off-screen target arrow -->
    <div id="target-arrow" class="hidden">◄</div>

    <div id="hitflash"></div>
    <div id="damage-vignette"></div>
    <div id="nameplates"></div>

    <div id="radar-wrap">
      <div class="minimap-frame">
        <button id="btn-autopilot" class="minimap-orb ap-btn" aria-label="Autopilot">
          <span class="orb-label">AP</span>
          <span class="orb-state" id="ap-state">OFF</span>
        </button>
        <button id="btn-daycycle" class="minimap-orb cycle-btn" aria-label="Time of day" title="Match day progress">
          <svg class="orb-cycle" viewBox="0 0 44 44" aria-hidden="true">
            <circle class="cycle-track" cx="22" cy="22" r="17" fill="none" />
            <circle id="cycle-ring" class="cycle-progress" cx="22" cy="22" r="17" fill="none" />
            <circle class="cycle-sun" cx="22" cy="22" r="5" />
            <circle class="cycle-moon" cx="22" cy="22" r="5" />
          </svg>
        </button>
        <button id="btn-settings" class="minimap-orb settings-btn" aria-label="Settings">
          <svg class="orb-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.488.488 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1 1 15.6 12 3.6 3.6 0 0 1 12 15.6z"/>
          </svg>
        </button>
        <canvas id="radar" width="256" height="256"></canvas>
      </div>
      <div id="ally-bar" class="ally-bar" aria-label="Allies"></div>
    </div>

    <div id="killfeed"></div>
  </div>

  <!-- Touch controls -->
  <div id="touch-ui" class="hidden">
    <div id="stick-zone" class="stick-zone">
      <div id="stick-base" class="stick-base">
        <div id="stick-knob" class="stick-knob"></div>
      </div>
    </div>

    <div class="btn-cluster">
      <button id="btn-throttle-up" class="touch-btn small">▲</button>
      <button id="btn-throttle-down" class="touch-btn small">▼</button>
      <button id="btn-cam" class="touch-btn small">CAM</button>
      <button id="btn-missile" class="touch-btn med">MSL</button>
      <button id="btn-fire" class="touch-btn big">FIRE</button>
    </div>
  </div>

  <!-- Respawn / replay panel -->
  <div id="respawn-panel" class="hidden">
    <div class="rp-timer">RESPAWN IN <span id="respawn-sec">8</span></div>
    <div id="replay-phase" class="rp-phase">
      <span class="rb-rec">● INSTANT REPLAY</span>
    </div>
    <div id="respawn-choices" class="rp-choices hidden">
      <button id="btn-replay-again" class="btn-secondary rp-btn">WATCH AGAIN</button>
      <button id="btn-spectate" class="btn-secondary rp-btn">SPECTATE ALLY</button>
    </div>
  </div>

  <!-- Match results -->
  <div id="gameover" class="hidden">
    <div class="menu-inner">
      <h1 class="logo gameover-title" id="results-title">MISSION COMPLETE</h1>
      <p class="tagline">Final score: <span id="final-score">0</span> · Wave <span id="final-wave">1</span></p>
      <button id="restart-btn" class="btn-primary">FLY AGAIN</button>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
